<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Página no encontrada | Performance Labs</title>
  <meta name="theme-color" content="#0B1220" />
  <style>
    :root{--bg:#0B1220;--text:#EAF2FF;--muted:#9DB0D1;--cyan:#22D3EE;--blue:#60A5FA;--line:rgba(255,255,255,.10)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(1000px 500px at 10% -10%, rgba(34,211,238,.08), transparent 60%),radial-gradient(900px 500px at 100% 0%, rgba(96,165,250,.10), transparent 50%),linear-gradient(180deg, #0B1220 0%, #0F172A 100%)}
    .box{width:min(680px, 100%);border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:24px;padding:32px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.28)}
    .mark{width:56px;height:56px;margin:0 auto 18px;border-radius:18px;display:grid;place-items:center;font-weight:900;color:#04111D;background:linear-gradient(135deg, var(--cyan), var(--blue))}
    h1{margin:0 0 10px;font-size:2rem;line-height:1.1}
    p{margin:0;color:var(--muted);line-height:1.6}
    .actions{margin-top:24px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .btn{min-height:46px;padding:0 18px;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;text-decoration:none}
    .btn--primary{background:linear-gradient(135deg, var(--cyan), var(--blue));color:#07111D}
    .btn--ghost{border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.03)}
  </style>
</head>
<body>
  <main class="box">
    <div class="mark">PL</div>
    <h1>Página no encontrada</h1>
    <p>Parece que esta ruta no existe o fue movida. Puedes volver al inicio y seguir revisando Performance Labs.</p>
    <div class="actions">
      <a class="btn btn--primary" href="./">Volver al inicio</a>
      <a class="btn btn--ghost" href="https://forms.gle/Sb2u6RuwZ6XTGvu79" target="_blank" rel="noopener noreferrer">Agendar una primera conversación</a>
    </div>
  </main>
</body>
</html>
